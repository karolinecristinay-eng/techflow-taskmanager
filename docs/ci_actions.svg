  <text x="60" y="153" font-size="11" fill="#57606a">main · pytest -v --maxfail=1 · concluído com sucesso</text>
  <text x="880" y="145" font-size="11" fill="#57606a">≈ 18s</text>

  <!-- Steps detail box -->
  <rect x="20" y="185" width="960" height="200" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="40" y="212" font-size="12" font-weight="bold" fill="#24292f">Jobs / test</text>

  <g font-size="12" fill="#24292f">
    <g><circle cx="45" cy="236" r="7" fill="#2da44e"/><path d="M 41.5 236 L 44 238.5 L 49 232.5" stroke="white" stroke-width="1.8" fill="none"/></g>
    <text x="58" y="240">Checkout do código</text>

    <g><circle cx="45" cy="260" r="7" fill="#2da44e"/><path d="M 41.5 260 L 44 262.5 L 49 256.5" stroke="white" stroke-width="1.8" fill="none"/></g>
    <text x="58" y="264">Configurar Python 3.11</text>

    <g><circle cx="45" cy="284" r="7" fill="#2da44e"/><path d="M 41.5 284 L 44 286.5 L 49 280.5" stroke="white" stroke-width="1.8" fill="none"/></g>
    <text x="58" y="288">Instalar dependências (pip install -r requirements.txt)</text>

    <g><circle cx="45" cy="308" r="7" fill="#2da44e"/><path d="M 41.5 308 L 44 310.5 L 49 304.5" stroke="white" stroke-width="1.8" fill="none"/></g>
    <text x="58" y="312">Rodar testes automatizados (Pytest) — 22 passed</text>

    <g><circle cx="45" cy="332" r="7" fill="#2da44e"/><path d="M 41.5 332 L 44 334.5 L 49 328.5" stroke="white" stroke-width="1.8" fill="none"/></g>
    <text x="58" y="336">Verificar qualidade básica do código (py_compile)</text>
