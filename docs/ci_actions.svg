<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="Arial, sans-serif">
  <rect width="1000" height="420" fill="#f6f8fa"/>

  <rect x="0" y="0" width="1000" height="50" fill="#24292f"/>
  <text x="20" y="31" font-size="16" fill="white" font-weight="bold">karolinecristinay-eng / techflow-taskmanager</text>
  <text x="780" y="31" font-size="13" fill="#8b949e">Actions</text>

  <rect x="0" y="50" width="1000" height="60" fill="white" stroke="#d0d7de"/>
  <text x="20" y="86" font-size="14" font-weight="bold">CI - Testes Automatizados</text>

  <!-- Run row -->
  <rect x="0" y="110" width="1000" height="60" fill="white" stroke="#d0d7de"/>
  <circle cx="35" cy="140" r="11" fill="#2da44e"/>
  <path d="M 30 140 L 34 144 L 41 135" stroke="white" stroke-width="2.5" fill="none"/>
