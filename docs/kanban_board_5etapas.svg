<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" font-family="Arial, sans-serif">
  <rect width="1400" height="760" fill="#f6f7fb"/>
  <text x="700" y="35" font-size="21" font-weight="bold" text-anchor="middle" fill="#1f2d5c">TechFlow TaskManager — Quadro Kanban (5 etapas)</text>

  <!-- Column headers -->
  <g font-size="13" fill="white" text-anchor="middle" font-weight="bold">
    <rect x="20"  y="60" width="260" height="38" fill="#57606f"/>
    <text x="150" y="84">BACKLOG</text>

    <rect x="292" y="60" width="260" height="38" fill="#1f2d5c"/>
    <text x="422" y="84">A FAZER</text>

    <rect x="564" y="60" width="260" height="38" fill="#0984e3"/>
    <text x="694" y="84">EM PROGRESSO</text>

    <rect x="836" y="60" width="260" height="38" fill="#e17055"/>
    <text x="966" y="84">EM REVISÃO / TESTES</text>

    <rect x="1108" y="60" width="272" height="38" fill="#00b894"/>
    <text x="1244" y="84">CONCLUÍDO</text>
  </g>

  <!-- Column backgrounds -->
  <rect x="20"  y="98" width="260" height="640" fill="#eceef5"/>
  <rect x="292" y="98" width="260" height="640" fill="#eceef5"/>
  <rect x="564" y="98" width="260" height="640" fill="#eceef5"/>
  <rect x="836" y="98" width="260" height="640" fill="#eceef5"/>
  <rect x="1108" y="98" width="272" height="640" fill="#eceef5"/>

  <!-- BACKLOG cards -->
  <g>
    <rect x="35" y="113" width="230" height="55" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="35" y="113" width="6" height="55" fill="#57606f"/>
    <text x="48" y="136" font-size="11.5">Persistir dados em banco</text>
    <text x="48" y="152" font-size="11.5">de dados (SQLite)</text>
  </g>
  <g>
    <rect x="35" y="178" width="230" height="55" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="35" y="178" width="6" height="55" fill="#57606f"/>
    <text x="48" y="201" font-size="11.5">Adicionar autenticação</text>
    <text x="48" y="217" font-size="11.5">de usuários (login)</text>
  </g>
  <g>
    <rect x="35" y="243" width="230" height="55" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="35" y="243" width="6" height="55" fill="#57606f"/>
    <text x="48" y="266" font-size="11.5">Adicionar filtro de tarefas</text>
    <text x="48" y="282" font-size="11.5">por data de criação</text>
  </g>

  <!-- A FAZER cards -->
  <g>
    <rect x="307" y="113" width="230" height="55" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="307" y="113" width="6" height="55" fill="#1f2d5c"/>
    <text x="320" y="136" font-size="11.5">Gravar vídeo pitch de</text>
    <text x="320" y="152" font-size="11.5">apresentação do projeto</text>
  </g>
  <g>
    <rect x="307" y="178" width="230" height="55" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="307" y="178" width="6" height="55" fill="#1f2d5c"/>
    <text x="320" y="201" font-size="11.5">Revisar comentários</text>
    <text x="320" y="217" font-size="11.5">no código-fonte</text>
  </g>

  <!-- EM PROGRESSO cards -->
  <g>
    <rect x="579" y="113" width="230" height="55" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="579" y="113" width="6" height="55" fill="#0984e3"/>
    <text x="592" y="136" font-size="11.5">Configurar pipeline de CI</text>
    <text x="592" y="152" font-size="11.5">(GitHub Actions)</text>
  </g>

  <!-- EM REVISÃO / TESTES cards -->
  <g>
    <rect x="851" y="113" width="230" height="70" rx="4" fill="#fdeeee" stroke="#d63031" stroke-width="1.5"/>
    <rect x="851" y="113" width="6" height="70" fill="#d63031"/>
    <text x="864" y="136" font-size="11.5" font-weight="bold">Priorizar tarefas críticas</text>
    <text x="864" y="152" font-size="10.5" fill="#d63031">(mudança de escopo)</text>
    <text x="864" y="168" font-size="9.5" fill="#888">em validação pelos testes</text>
  </g>
  <g>
    <rect x="851" y="193" width="230" height="55" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="851" y="193" width="6" height="55" fill="#e17055"/>
    <text x="864" y="216" font-size="11.5">Revisão de código do</text>
    <text x="864" y="232" font-size="11.5">módulo models.py</text>
  </g>

  <!-- CONCLUÍDO cards -->
  <g>
    <rect x="1123" y="113" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="113" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="137" font-size="11.5">Modelar diagrama de casos de uso</text>
  </g>
  <g>
    <rect x="1123" y="160" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="160" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="184" font-size="11.5">Modelar diagrama de classes</text>
  </g>
  <g>
    <rect x="1123" y="207" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="207" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="231" font-size="11.5">Implementar modelo Task (CRUD)</text>
  </g>
  <g>
    <rect x="1123" y="254" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="254" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="278" font-size="11.5">Implementar rotas da API REST</text>
  </g>
  <g>
    <rect x="1123" y="301" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="301" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="325" font-size="11.5">Implementar interface HTML</text>
  </g>
  <g>
    <rect x="1123" y="348" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="348" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="372" font-size="11.5">Escrever testes unitários</text>
  </g>
  <g>
    <rect x="1123" y="395" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="395" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="419" font-size="11.5">Escrever testes de integração</text>
  </g>
  <g>
    <rect x="1123" y="442" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="442" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="466" font-size="11.5">Escrever README.md</text>
  </g>
  <g>
    <rect x="1123" y="489" width="242" height="40" rx="4" fill="white" stroke="#b2bec3" stroke-width="1.5"/>
    <rect x="1123" y="489" width="6" height="40" fill="#00b894"/>
    <text x="1136" y="513" font-size="11.5">Escrever GUIA_DE_ENTREGA.md</text>
  </g>

  <text x="700" y="735" font-size="12" text-anchor="middle" fill="#666">
    Quadro Kanban — TechFlow TaskManager (referência para GitHub Projects)
  </text>
</svg>
